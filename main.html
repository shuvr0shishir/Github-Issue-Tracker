<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Home</title>

    <!-- All Cdns -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Css -->
    <link rel="stylesheet" href="./styles/style.css">

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
</head>

<body>
    <header class="border-b border-gray-200 bg-white/30 backdrop-blur-md sticky top-0 z-50">
        <nav class="max-w-[90%] mx-auto flex  gap-5  justify-between items-center p-4">
            <div class="nav-left flex items-center h-9 gap-2">
                <img class="h-full" src="./assets/github-logo.png" alt="">
                <h1 class="hidden md:inline text-2xl font-semibold">GitHub Issues Tracker</h1>
            </div>

            <div class="nav-right flex gap-2 sm:gap-4">
                <div class="flex">
                    <label class="input outline-none rounded-r-none border-gray-200 max-w-22  sm:max-w-full">
                        <input id="search-txt" type="search" required placeholder="Search Issues..." />
                    </label>
                    <button id="search-btn"
                        class="btn btn-accent shadow-none rounded-md rounded-l-none md:text-[16px] "><i
                            class="fa-solid fa-magnifying-glass md:hidden"></i>
                        <span class="hidden sm:inline">Search</span></button>
                </div>

                <!-- add new  issue btn-->
                <button id="new-issue-btn" class="btn btn-primary rounded-md md:text-[16px] "><i
                        class="fa-solid fa-plus"></i>
                    <span class="hidden sm:inline">New Issue</span></button>
            </div>
        </nav>
    </header>

    <main class="bg-[#F8FAFC] py-5 md:py-15 min-h-screen ">
        <!-- tab section -->
        <section class="max-w-[95%] md:max-w-[69%] mx-auto bg-white rounded-lg flex flex-row gap-2 p-6 shadow">
            <button id="all-tab"
                class="tab-btns btn btn-primary text-[16px] font-semibold md:w-[120px] md:h-10 rounded">All</button>
            <button id="open-tab"
                class="tab-btns btn  text-[16px] font-semibold md:w-[120px] md:h-10 rounded">Open</button>
            <button id="close-tab"
                class="tab-btns btn  text-[16px] font-semibold md:w-[120px] md:h-10 rounded">Closed</button>
        </section>

        <!-- all issues -->
        <section id="issues-box" class="max-w-[95%] md:max-w-[69%] mx-auto bg-white rounded-lg shadow mt-4 ">
            <!-- issues heading -->
            <div class="issues-heading p-6 flex gap-3  sm:justify-between items-center border-b-2 border-gray-200">
                <div class="ih-left flex items-center gap-2">
                    <div class="bg-[#ECE4FF] rounded-full p-2.5">
                        <img class="w-8" src="./assets/Aperture.png" alt="">
                    </div>
                    <div class="">
                        <h2 id="issue-count" class="font-semibold text-xl"><span id="issues-count">0</span> Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="ih-right flex flex-col sm:flex-row items-start sm:items-center sm:gap-4">
                    <div class="flex items-center gap-2">
                        <div class="status status-lg bg-[#00A96E] shadow-none"></div>
                        <p class="font-medium text">Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="status status-lg bg-[#A855F7] shadow-none"></div>
                        <p class="font-medium text">Closed</p>
                    </div>
                </div>
            </div>

            <!-- issues container -->
            <div id="issues-container"
                class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 bg-[#FBFBFB] p-6 rounded-b-lg">
                <!-- issues card will dynamically generate here  -->
            </div>
        </section>

        <!-- Loading screen -->
        <section id="spinner" class="hidden">
            <div class="py-10 flex justify-center items-center">
                <span class="loading loading-ring loading-xl text-primary"></span>
            </div>
        </section>

        <!-- Modal - issue pop up -->
        <dialog id="issue-modal" class="modal modal-bottom sm:modal-middle bg-[#002C5C50]">
            <div class="modal-box p-3 bg-white/30 backdrop-blur-md">
                <div id="issue-details" class="space-y-6  bg-white p-5 rounded-lg">
                    <!-- details will generate dynamically here -->
                </div>
                <div class="modal-action mb-3">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary outline-none">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        <!-- Modal - new issue -->
        <dialog id="issue-post-modal" class="modal modal-bottom sm:modal-middle bg-[#002C5C50]">
            <div class="modal-box p-3 bg-white/30 backdrop-blur-md">
                <div id="issue-input-box" class="space-y-6  bg-white p-5 rounded-lg">
                    <!-- form will generate dynamically here -->
                </div>
                <div class="modal-action mb-3 justify-start">
                    <form class="flex gap-3 " method="dialog">
                        <!-- post btn with onclick handler -->
                        <button onclick="issueMaker()" type="submit" class="btn btn-primary px-7">Post</button>

                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary outline-none">Cancel</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>


    <script src="./scripts/machine.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
